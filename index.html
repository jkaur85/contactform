<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Let's Get In Touch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="logo">
                <span class="logo-icon">S</span>
                <span class="logo-text">slothui</span>
            </div>
            
            <h1>Let's Get In Touch.</h1>
            <p class="subtitle">Or just reach out manually to <a href="mailto:contactus@solutions.com.au">contactus@solutions.com.au</a>.</p>
            
            <form class="contact-form" id="contactForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="firstName" name="firstName" placeholder="Enter your first name..." required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="lastName" name="lastName" placeholder="Enter your last name..." required>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="email" name="email" placeholder="Enter your email address..." required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="input-wrapper phone-wrapper">
                        <div class="country-selector">
                            <img src="https://flagcdn.com/w20/gb.png" alt="UK Flag" class="flag-icon">
                            <span class="dropdown-arrow">▼</span>
                        </div>
                        <input type="tel" id="phone" name="phone" placeholder="+44 (000) 000-0000">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <div class="textarea-wrapper">
                        <textarea id="message" name="message" placeholder="Enter your main text here..." rows="6"></textarea>
                        <div class="char-counter">300/300</div>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">
                    Submit Form
                    <span class="btn-arrow">→</span>
                </button>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
